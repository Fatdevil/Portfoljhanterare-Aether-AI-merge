name: 📊 Uppdatera Bolåneräntor

on:
  schedule:
    # Kör varje dag 07:00 CET (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Möjliggör manuell trigger från GitHub UI

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4

      - name: 🔄 Run rate updater
        run: python scripts/update_rates.py

      - name: 📝 Check for changes
        id: check
        run: |
          git diff --quiet js/mortgage_banks_data.js js/savings_data.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 🚀 Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/mortgage_banks_data.js js/savings_data.js
          git commit -m "🔄 Auto-uppdatering bolåneräntor $(date +'%Y-%m-%d')"
          git push
