name: 📊 Uppdatera Bolåneräntor & Kalibrera Avdragskurvor

on:
  schedule:
    # Daglig ränteuppdatering: 07:00 CET (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      calibrate:
        description: 'Kör Playwright-kalibrering av avdragskurvor'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════
  #  JOB 1: Daglig ränteuppdatering
  # ═══════════════════════════════════════════
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4

      - name: 🔄 Run rate updater
        run: python scripts/update_rates.py

      - name: 📝 Check for changes
        id: check
        run: |
          git diff --quiet js/mortgage_banks_data.js js/savings_data.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 🚀 Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/mortgage_banks_data.js js/savings_data.js
          git commit -m "🔄 Auto-uppdatering bolåneräntor $(date +'%Y-%m-%d')"
          git push

  # ═══════════════════════════════════════════
  #  JOB 2: Veckovis kalibrering (varje måndag)
  #  Testar SBAB, Skandia, ICA kalkylatorer
  # ═══════════════════════════════════════════
  calibrate-discount-curves:
    runs-on: ubuntu-latest
    # Kör varje måndag (dag 1) ELLER vid manuell trigger med calibrate=true
    if: (github.event_name == 'schedule' && github.run_number != '' ) || github.event.inputs.calibrate == 'true'
    needs: update-rates
    steps:
      - name: 📅 Check if Monday
        id: daycheck
        run: |
          DOW=$(date +%u)
          echo "day=$DOW" >> $GITHUB_OUTPUT
          if [ "$DOW" != "1" ] && [ "${{ github.event_name }}" == "schedule" ]; then
            echo "Not Monday (day=$DOW), skipping calibration."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: 📥 Checkout repo
        if: steps.daycheck.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🔄 Pull latest changes
        if: steps.daycheck.outputs.skip != 'true'
        run: git pull origin main

      - name: 🐍 Setup Python
        if: steps.daycheck.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        if: steps.daycheck.outputs.skip != 'true'
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps

      - name: 🎯 Calibrate discount curves
        if: steps.daycheck.outputs.skip != 'true'
        run: python scripts/calibrate_discount_curves.py
        timeout-minutes: 10

      - name: 📝 Check for changes
        id: check-curves
        run: |
          git diff --quiet js/discount_curves.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 🚀 Commit and push
        if: steps.check-curves.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/discount_curves.js
          git commit -m "🎯 Auto-kalibrering avdragskurvor $(date +'%Y-%m-%d')"
          git push
